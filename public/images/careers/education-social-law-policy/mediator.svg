<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad20" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(120, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(160, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow20" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Education Background Elements -->
    <path d="M0,100 L600,100" stroke="hsl(140, 80%, 60%)" stroke-width="20" opacity="0.05" /><path d="M0,300 L600,300" stroke="hsl(140, 80%, 60%)" stroke-width="20" opacity="0.05" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad20)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow20)">
        <path d="M200,100 L400,100 L400,300 L200,300 Z" fill="url(#grad20)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad20)" />
        <path d="M18,18.5V20H6V18.5C6,18.5 6,17 9,17H15C18,17 18,18.5 18,18.5M12,12A3,3 0 0,0 15,9A3,3 0 0,0 12,6A3,3 0 0,0 9,9A3,3 0 0,0 12,12M12,2L1,5V11C1,16.55 5.84,21.74 12,23C18.16,21.74 23,16.55 23,11V5L12,2Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>