<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad19" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(108, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(148, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow19" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Education Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="20" transform="rotate(15)" fill="hsl(128, 80%, 60%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(128, 80%, 60%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad19)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow19)">
        <circle cx="300" cy="200" r="110" fill="url(#grad19)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad19)" />
        <path d="M21.71,11.29L20.71,12.29L18.71,10.29L19.71,9.29C20.1,8.9 20.74,8.9 21.13,9.29L21.71,9.87C22.1,10.26 22.1,10.9 21.71,11.29M12.29,18.71L12.29,20.71L14.29,20.71L20.13,14.87L18.13,12.87L12.29,18.71M6,22H18V20H6V22M6,18H18V16H6V18M6,14H18V12H6V14M12,2L2,7V18H22V7L12,2Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
