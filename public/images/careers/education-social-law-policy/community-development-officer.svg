<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad13" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(36, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(76, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow13" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Education Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="20" transform="rotate(15)" fill="hsl(56, 80%, 60%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(56, 80%, 60%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad13)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow13)">
        <circle cx="300" cy="200" r="110" fill="url(#grad13)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad13)" />
        <path d="M16,13C15.71,13 15.38,13 15.03,13.05C16.19,13.89 17,15.11 17,16.5V19H22V16.5C22,14.84 21.14,13.43 19,13.21V13M12,13C9.33,13 4,14.33 4,17V19H15V17C15,14.33 9.67,13 12,13M12,11A3,3 0 1,0 9,8A3,3 0 0,0 12,11M19,11A3,3 0 1,0 16,8A3,3 0 0,0 19,11Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>