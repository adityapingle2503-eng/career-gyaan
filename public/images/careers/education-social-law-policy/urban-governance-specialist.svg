<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad22" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(144, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(184, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow22" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Education Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="20" transform="rotate(15)" fill="hsl(164, 80%, 60%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(164, 80%, 60%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad22)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow22)">
        <circle cx="300" cy="200" r="110" fill="url(#grad22)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad22)" />
        <path d="M15,11V5L12,2L9,5V11H15M11,11V13H13V11H11M11,15V17H13V15H11M11,19V21H13V19H11M17,11V13H19V11H17M17,15V17H19V15H17M17,19V21H19V19H17M5,11V13H7V11H5M5,15V17H7V15H5M5,19V21H7V19H5Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>