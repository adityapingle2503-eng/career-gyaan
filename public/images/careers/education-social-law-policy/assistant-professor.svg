<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(264, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(304, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Education Background Elements -->
    <path d="M0,100 L600,100" stroke="hsl(284, 80%, 60%)" stroke-width="20" opacity="0.05" /><path d="M0,300 L600,300" stroke="hsl(284, 80%, 60%)" stroke-width="20" opacity="0.05" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad2)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow2)">
        <path d="M200,100 L400,100 L400,300 L200,300 Z" fill="url(#grad2)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad2)" />
        <path d="M12,3L1,9L12,15L23,9L12,3M12,17.27L4.5,13.18V20.29L12,24.41L19.5,20.29V13.18L12,17.27Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>