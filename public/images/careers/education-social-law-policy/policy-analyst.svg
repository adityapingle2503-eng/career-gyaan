<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad21" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(132, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(172, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow21" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Education Background Elements -->
    <circle cx="500" cy="100" r="120" fill="hsl(152, 80%, 60%)" opacity="0.08" /><rect x="50" y="250" width="100" height="100" rx="10" fill="hsl(152, 80%, 60%)" opacity="0.05" transform="rotate(45, 100, 300)" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad21)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow21)">
        <rect x="200" y="100" width="200" height="200" rx="20" fill="url(#grad21)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad21)" />
        <path d="M14,2H6C4.89,2 4,2.9 4,4V20C4,21.1 4.89,22 6,22H18C19.1,22 20,21.1 20,20V8L14,2M12,18H6V16H12V18M16,14H6V12H16V14M16,10H6V8H16V10M13,9V3.5L18.5,9H13Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>