<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad22" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(145, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(205, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow22" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Creative Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="60" transform="rotate(30)" fill="hsl(175, 90%, 70%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(175, 90%, 70%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad22)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow22)">
        <circle cx="300" cy="200" r="110" fill="url(#grad22)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad22)" />
        <path d="M2,2H22V22H2V2M4,4V20H20V4H4M6,6H10V10H6V6M14,6H18V10H14V6M6,14H10V18H6V14M14,14H18V18H14V14Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>