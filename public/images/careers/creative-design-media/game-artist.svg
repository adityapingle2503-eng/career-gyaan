<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad13" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(347, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(47, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow13" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Creative Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="60" transform="rotate(30)" fill="hsl(17, 90%, 70%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(17, 90%, 70%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad13)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow13)">
        <circle cx="300" cy="200" r="110" fill="url(#grad13)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad13)" />
        <path d="M21,6H3C1.9,6 1,6.9 1,8V16C1,17.1 1.9,18 3,18H21C22.1,18 23,17.1 23,16V8C23,6.9 22.1,6 21,6M6,15H4V13H2V11H4V9H6V11H8V13H6V15M14.5,15C13.67,15 13,14.33 13,13.5C13,12.67 13.67,12 14.5,12C15.33,12 16,12.67 16,13.5C16,14.33 15.33,15 14.5,15M18.5,12C17.67,12 17,11.33 17,10.5C17,9.67 17.67,9 18.5,9C19.33,9 20,9.67 20,10.5C20,11.33 19.33,12 18.5,12Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
