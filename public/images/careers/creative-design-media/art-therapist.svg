<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad24" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(60, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(120, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow24" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Creative Background Elements -->
    <circle cx="500" cy="100" r="120" fill="hsl(90, 90%, 70%)" opacity="0.08" /><rect x="50" y="250" width="100" height="100" rx="20" fill="hsl(90, 90%, 70%)" opacity="0.05" transform="rotate(15, 100, 300)" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad24)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow24)">
        <rect x="200" y="100" width="200" height="200" rx="40" fill="url(#grad24)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad24)" />
        <path d="M12,2C6.47,2 2,6.47 2,12C2,17.53 6.47,22 12,22C17.53,22 22,17.53 22,12C22,6.47 17.53,2 12,2M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M15.5,11C16.33,11 17,10.33 17,9.5C17,8.67 16.33,8 15.5,8C14.67,8 14,8.67 14,9.5C14,10.33 14.67,11 15.5,11M8.5,11C9.33,11 10,10.33 10,9.5C10,8.67 9.33,8 8.5,8C7.67,8 7,8.67 7,9.5C7,10.33 7.67,11 8.5,11M12,17.5C14.33,17.5 16.31,16.04 17.11,14H6.89C7.69,16.04 9.67,17.5 12,17.5Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
