<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(52, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(112, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Creative Background Elements -->
    <circle cx="500" cy="100" r="120" fill="hsl(82, 90%, 70%)" opacity="0.08" /><rect x="50" y="250" width="100" height="100" rx="20" fill="hsl(82, 90%, 70%)" opacity="0.05" transform="rotate(15, 100, 300)" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad3)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow3)">
        <rect x="200" y="100" width="200" height="200" rx="40" fill="url(#grad3)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad3)" />
        <path d="M15,10H11V14H15V10M17,10V14H19V10H17M11,16V18H15V16H11M17,16V18H19V16H17M9,10V14H7V10H9M9,16V18H7V16H9M21,10V14H23V10H21M21,16V18H23V16H21M1,10V14H3V10H1M1,16V18H3V16H1M5,10V14H3V10H5M5,16V18H3V16H5M12,2L1,5V11C1,16.55 5.84,21.74 12,23C18.16,21.74 23,16.55 23,11V5L12,2Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>