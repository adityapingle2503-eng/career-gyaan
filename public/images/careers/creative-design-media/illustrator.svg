<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(137, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(197, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Creative Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="60" transform="rotate(30)" fill="hsl(167, 90%, 70%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(167, 90%, 70%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad1)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow1)">
        <circle cx="300" cy="200" r="110" fill="url(#grad1)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad1)" />
        <path d="M17,11C15.9,11 15,10.1 15,9C15,7.9 15.9,7 17,7C18.1,7 19,7.9 19,9C19,10.1 18.1,11 17,11M12,2C10.34,2 9,3.34 9,5C9,6.66 10.34,8 12,8C13.66,8 15,6.66 15,5C15,3.34 13.66,2 12,2M7,11C5.9,11 5,10.1 5,9C5,7.9 5.9,7 7,7C8.1,7 9,7.9 9,9C9,10.1 8.1,11 7,11M12,22C16.42,22 20,18.42 20,14C20,11 16,5 12,5C8,5 4,11 4,14C4,18.42 7.58,22 12,22Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>