<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad14" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(125, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(185, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow14" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Creative Background Elements -->
    <path d="M-50,200 Q150,50 350,200 T750,200" fill="none" stroke="hsl(155, 90%, 70%)" stroke-width="40" opacity="0.05" /><rect x="450" y="250" width="120" height="120" rx="60" fill="hsl(155, 90%, 70%)" opacity="0.08" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad14)" opacity="0.05" />
    
