        <path d="M13.5,19H14.5V22H13.5V19M11,19H12V22H11V19M16,19H17V22H16V19M18.5,19H19.5V22H18.5V19M8.5,19H9.5V22H8.5V19M6,19H7V22H6V19M3.5,19H4.5V22H3.5V19M21,6H3C1.9,6 1,6.9 1,8V16C1,17.1 1.9,18 3,18H21C22.1,18 23,17.1 23,16V8C23,6.9 22.1,6 21,6Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
