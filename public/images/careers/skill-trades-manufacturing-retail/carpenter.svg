<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(90, 80%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(120, 70%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow7" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Industrial Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="40" transform="rotate(30)" fill="hsl(105, 90%, 60%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(105, 90%, 60%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad7)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow7)">
        <circle cx="300" cy="200" r="110" fill="url(#grad7)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad7)" />
        <path d="M19.41,7.41L18,6L11,13V17H15L22,10V9H19.41M12,18H4V6H12V18M12,4H4C2.9,4 2,4.9 2,6V18C2,19.1 2.9,20 4,20H12V22H14V20H20C21.1,20 22,19.1 22,18V12H20V18H14V14.41L12.59,13H14V12H13.41L12,10.59V11H11V10H11.41L10,8.59V9H9V8H9.41L8,6.59V7H7V6H7.41L6,4.59V5H5V4H12V2H10V4H12Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
