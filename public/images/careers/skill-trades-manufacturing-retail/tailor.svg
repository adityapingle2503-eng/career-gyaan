<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad12" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(140, 80%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(170, 70%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow12" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Industrial Background Elements -->
    <circle cx="500" cy="100" r="120" fill="hsl(155, 90%, 60%)" opacity="0.08" /><path d="M50,50 L150,50 L100,150 Z" fill="hsl(155, 90%, 60%)" opacity="0.05" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad12)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow12)">
        <rect x="200" y="100" width="200" height="200" rx="30" fill="url(#grad12)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad12)" />
        <path d="M12,2A3,3 0 0,1 15,5V7H18V9H6V7H9V5A3,3 0 0,1 12,2M19,10H5V22H19V10M12,12A3,3 0 0,0 9,15H15A3,3 0 0,0 12,12Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>