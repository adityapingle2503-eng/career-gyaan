<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad27" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(290, 80%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(320, 70%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow27" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Industrial Background Elements -->
    <circle cx="500" cy="100" r="120" fill="hsl(305, 90%, 60%)" opacity="0.08" /><path d="M50,50 L150,50 L100,150 Z" fill="hsl(305, 90%, 60%)" opacity="0.05" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad27)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow27)">
        <rect x="200" y="100" width="200" height="200" rx="30" fill="url(#grad27)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad27)" />
        <path d="M20,18H4V6H20M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6C22,4.89 21.1,4 20,4M12,8L10.5,10.5L8,11.5L10.5,12.5L11.5,15L12.5,12.5L15,11.5L12.5,10.5L12,8Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>