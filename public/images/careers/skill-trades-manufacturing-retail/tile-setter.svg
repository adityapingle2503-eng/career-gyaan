<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad10" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(120, 80%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(150, 70%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow10" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Industrial Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="40" transform="rotate(30)" fill="hsl(135, 90%, 60%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(135, 90%, 60%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad10)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow10)">
        <circle cx="300" cy="200" r="110" fill="url(#grad10)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad10)" />
        <path d="M20,18H4V6H20M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6C22,4.89 21.1,4 20,4M11,10V8H13V10H15V12H13V14H11V12H9V10H11Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>