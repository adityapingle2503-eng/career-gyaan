<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad22" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(156, 80%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(176, 70%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow22" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Artistic Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="150" transform="rotate(30)" fill="hsl(196, 90%, 60%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(196, 90%, 60%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad22)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow22)">
        <circle cx="300" cy="200" r="110" fill="url(#grad22)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad22)" />
        <path d="M12,2C6.48,2 2,6.48 2,12C2,17.52 6.48,22 12,22C17.52,22 22,17.52 22,12C22,6.48 17.52,2 12,2M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,6V12L16,14L17,12.5L13.5,11V6H12Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>