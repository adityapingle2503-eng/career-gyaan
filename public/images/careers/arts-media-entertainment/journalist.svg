<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad17" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(116, 80%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(136, 70%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow17" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Artistic Background Elements -->
    <path d="M0,200 Q150,50 300,200 T600,200" fill="none" stroke="hsl(156, 90%, 60%)" stroke-width="40" opacity="0.05" /><rect x="450" y="250" width="120" height="120" rx="20" fill="hsl(156, 90%, 60%)" opacity="0.08" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad17)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow17)">
        <path d="M300,100 L400,200 L300,300 L200,200 Z" fill="url(#grad17)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad17)" />
        <path d="M20,5H4C2.9,5 2,5.9 2,7V17C2,18.1 2.9,19 4,19H20C21.1,19 22,18.1 22,17V7C22,5.9 21.1,5 20,5M20,17H4V12H20V17M20,10H4V7H20V10Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>