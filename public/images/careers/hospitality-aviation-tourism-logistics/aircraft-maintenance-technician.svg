<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad16" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(80, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(120, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow16" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Hospitality Background Elements -->
    <rect x="400" y="-50" width="300" height="300" rx="60" transform="rotate(30)" fill="hsl(100, 90%, 70%)" opacity="0.06" /><circle cx="100" cy="300" r="80" fill="hsl(100, 90%, 70%)" opacity="0.07" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad16)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow16)">
        <circle cx="300" cy="200" r="110" fill="url(#grad16)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad16)" />
        <path d="M22.7,19L20.4,16.7C20.2,16.5 20,16.4 19.7,16.4C19.4,16.4 19.2,16.5 19,16.7L18,17.7L15.3,15L18,12.3L19,13.3C19.2,13.5 19.4,13.6 19.7,13.6C20,13.6 20.2,13.5 20.4,13.3L22.7,11C23.1,10.6 23.1,10 22.7,9.6L14.4,1.3C14,0.9 13.4,0.9 13,1.3L10.7,3.6C10.5,3.8 10.4,4 10.4,4.3C10.4,4.6 10.5,4.8 10.7,5L11.7,6L1,16.7V23H7.3L18,12.3L19,13.3L18,14.3L20.7,17L18,19.7C17.8,19.9 17.7,20.1 17.7,20.4C17.7,20.7 17.8,20.9 18,21.1L20.3,23.4C20.7,23.8 21.3,23.8 21.7,23.4L22.7,20.4C23.1,20 23.1,19.4 22.7,19Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
