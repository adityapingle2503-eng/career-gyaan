<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad0" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(200, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(240, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow0" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Hospitality Background Elements -->
    <circle cx="500" cy="100" r="120" fill="hsl(220, 90%, 70%)" opacity="0.08" /><path d="M50,350 L150,350 L100,250 Z" fill="hsl(220, 90%, 70%)" opacity="0.05" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad0)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow0)">
        <rect x="200" y="100" width="200" height="200" rx="40" fill="url(#grad0)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad0)" />
        <path d="M7,14H5.6L5.04,15.12L4,14.6L4.56,13.48L3.12,12.92L3.64,11.88L5.08,12.44L5.64,11.32L6.68,11.84L6.12,12.96L7.56,13.52L7,14M19,10H5V19H19V10M19,8H5A2,2 0 0,0 3,10V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V10A2,2 0 0,0 19,8M15,10V19H13V10H15M11,10V19H9V10H11M12,2L2,7V8H22V7L12,2Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>