<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad18" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(110, 80%, 60%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(150, 70%, 50%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow18" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Hospitality Background Elements -->
    <circle cx="500" cy="100" r="120" fill="hsl(130, 90%, 70%)" opacity="0.08" /><path d="M50,350 L150,350 L100,250 Z" fill="hsl(130, 90%, 70%)" opacity="0.05" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad18)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow18)">
        <rect x="200" y="100" width="200" height="200" rx="40" fill="url(#grad18)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad18)" />
        <path d="M20,8V12H2V8H20M22,21H2V14H22V21M20,3H4V7H20V3Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>