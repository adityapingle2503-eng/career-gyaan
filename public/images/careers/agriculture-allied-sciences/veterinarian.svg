<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad12" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(300, 80%, 40%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(320, 70%, 30%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow12" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
            <feOffset dx="0" dy="8" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Dynamic Nature Background Elements -->
    <circle cx="500" cy="100" r="120" fill="hsl(340, 90%, 60%)" opacity="0.08" /><path d="M50,350 L150,350 L100,250 Z" fill="hsl(340, 90%, 60%)" opacity="0.05" />
    
    <!-- Glassmorphic Glow -->
    <circle cx="300" cy="200" r="150" fill="url(#grad12)" opacity="0.05" />
    
    <!-- Central Illustration Shape -->
    <g filter="url(#shadow12)">
        <rect x="200" y="100" width="200" height="200" rx="40" fill="url(#grad12)" opacity="0.2" />
        
        <circle cx="300" cy="200" r="70" fill="url(#grad12)" />
        <path d="M12,2C14.21,2 16,3.79 16,6C16,8.21 14.21,10 12,10C9.79,10 8,8.21 8,6C8,3.79 9.79,2 12,2M12,12C14.67,12 20,13.33 20,16V18H4V16C4,13.33 9.33,12 12,12M19,3H5C3.89,3 3,3.89 3,5V15H5V5H19V15H21V5C21,3.89 20.11,3 19,3Z" transform="translate(265, 165) scale(2.9)" fill="#ffffff" />
    </g>

    <!-- Floating Particles -->
    <g opacity="0.15">
        <circle cx="150" cy="80" r="4" fill="#ffffff" />
        <circle cx="450" cy="320" r="6" fill="#ffffff" />
        <circle cx="520" cy="180" r="3" fill="#ffffff" />
        <circle cx="80" cy="200" r="5" fill="#ffffff" />
    </g>
</svg>