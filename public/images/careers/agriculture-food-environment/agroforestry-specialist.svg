<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad22" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(145, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(185, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow22" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
            <feOffset dx="0" dy="10" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Abstract Patterns -->
    <rect x="400" y="-50" width="300" height="300" rx="40" transform="rotate(15)" fill="hsl(165, 80%, 60%)" opacity="0.05" />
    <path d="M0,400 Q150,300 300,400 T600,400 L600,400 L0,400 Z" fill="hsl(145, 70%, 50%)" opacity="0.1" />
    
    <!-- Main Decorative Shape -->
    <rect x="150" y="50" width="300" height="300" rx="60" fill="url(#grad22)" opacity="0.15" />
    <circle cx="300" cy="200" r="120" stroke="url(#grad22)" stroke-width="2" fill="none" opacity="0.3" />
    
    <!-- Icon Container -->
    <g filter="url(#shadow22)">
        <circle cx="300" cy="200" r="60" fill="url(#grad22)" />
        <path d="M17,8C8,8 4,16 4,16C4,16 3,21 15,21C27,21 21,8 21,8C21,8 19,8 17,8M12,19C10.34,19 9,17.66 9,16C9,14.34 10.34,13 12,13C13.66,13 15,14.34 15,16C15,17.66 13.66,19 12,19Z" transform="translate(270, 170) scale(2.5)" fill="#ffffff" />
    </g>
    
    <!-- Pattern Grids -->
    <g opacity="0.1">
        <circle cx='50' cy='50' r='2' fill='#ffffff' /><circle cx='50' cy='70' r='2' fill='#ffffff' /><circle cx='50' cy='90' r='2' fill='#ffffff' /><circle cx='50' cy='110' r='2' fill='#ffffff' /><circle cx='50' cy='130' r='2' fill='#ffffff' /><circle cx='70' cy='50' r='2' fill='#ffffff' /><circle cx='70' cy='70' r='2' fill='#ffffff' /><circle cx='70' cy='90' r='2' fill='#ffffff' /><circle cx='70' cy='110' r='2' fill='#ffffff' /><circle cx='70' cy='130' r='2' fill='#ffffff' /><circle cx='90' cy='50' r='2' fill='#ffffff' /><circle cx='90' cy='70' r='2' fill='#ffffff' /><circle cx='90' cy='90' r='2' fill='#ffffff' /><circle cx='90' cy='110' r='2' fill='#ffffff' /><circle cx='90' cy='130' r='2' fill='#ffffff' /><circle cx='110' cy='50' r='2' fill='#ffffff' /><circle cx='110' cy='70' r='2' fill='#ffffff' /><circle cx='110' cy='90' r='2' fill='#ffffff' /><circle cx='110' cy='110' r='2' fill='#ffffff' /><circle cx='110' cy='130' r='2' fill='#ffffff' /><circle cx='130' cy='50' r='2' fill='#ffffff' /><circle cx='130' cy='70' r='2' fill='#ffffff' /><circle cx='130' cy='90' r='2' fill='#ffffff' /><circle cx='130' cy='110' r='2' fill='#ffffff' /><circle cx='130' cy='130' r='2' fill='#ffffff' />
