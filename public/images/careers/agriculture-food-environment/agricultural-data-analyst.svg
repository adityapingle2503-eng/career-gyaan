<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(327, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(7, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
            <feOffset dx="0" dy="10" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Abstract Patterns -->
    <rect x="400" y="-50" width="300" height="300" rx="40" transform="rotate(15)" fill="hsl(347, 80%, 60%)" opacity="0.05" />
    <path d="M0,400 Q150,300 300,400 T600,400 L600,400 L0,400 Z" fill="hsl(327, 70%, 50%)" opacity="0.1" />
    
    <!-- Main Decorative Shape -->
    <rect x="150" y="50" width="300" height="300" rx="60" fill="url(#grad5)" opacity="0.15" />
    <circle cx="300" cy="200" r="120" stroke="url(#grad5)" stroke-width="2" fill="none" opacity="0.3" />
    
    <!-- Icon Container -->
    <g filter="url(#shadow5)">
        <circle cx="300" cy="200" r="60" fill="url(#grad5)" />
        <path d="M19,3H5C3.89,3 3,3.9 3,5V19C3,20.1 3.89,21 5,21H19C20.1,21 21,20.1 21,19V5C21,3.9 20.1,3 19,3M19,19H5V5H19V19M7,10H9V17H7V10M11,13H13V17H11V13M15,7H17V17H15V7Z" transform="translate(270, 170) scale(2.5)" fill="#ffffff" />
    </g>
    
    <!-- Pattern Grids -->
    <g opacity="0.1">
        <circle cx='50' cy='50' r='2' fill='#ffffff' /><circle cx='50' cy='70' r='2' fill='#ffffff' /><circle cx='50' cy='90' r='2' fill='#ffffff' /><circle cx='50' cy='110' r='2' fill='#ffffff' /><circle cx='50' cy='130' r='2' fill='#ffffff' /><circle cx='70' cy='50' r='2' fill='#ffffff' /><circle cx='70' cy='70' r='2' fill='#ffffff' /><circle cx='70' cy='90' r='2' fill='#ffffff' /><circle cx='70' cy='110' r='2' fill='#ffffff' /><circle cx='70' cy='130' r='2' fill='#ffffff' /><circle cx='90' cy='50' r='2' fill='#ffffff' /><circle cx='90' cy='70' r='2' fill='#ffffff' /><circle cx='90' cy='90' r='2' fill='#ffffff' /><circle cx='90' cy='110' r='2' fill='#ffffff' /><circle cx='90' cy='130' r='2' fill='#ffffff' /><circle cx='110' cy='50' r='2' fill='#ffffff' /><circle cx='110' cy='70' r='2' fill='#ffffff' /><circle cx='110' cy='90' r='2' fill='#ffffff' /><circle cx='110' cy='110' r='2' fill='#ffffff' /><circle cx='110' cy='130' r='2' fill='#ffffff' /><circle cx='130' cy='50' r='2' fill='#ffffff' /><circle cx='130' cy='70' r='2' fill='#ffffff' /><circle cx='130' cy='90' r='2' fill='#ffffff' /><circle cx='130' cy='110' r='2' fill='#ffffff' /><circle cx='130' cy='130' r='2' fill='#ffffff' />
