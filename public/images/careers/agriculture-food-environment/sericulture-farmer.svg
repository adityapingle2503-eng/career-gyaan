<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(242, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(282, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow7" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
            <feOffset dx="0" dy="10" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="400" fill="#0f172a" />
    
    <!-- Abstract Patterns -->
    <circle cx="500" cy="100" r="150" fill="hsl(262, 80%, 60%)" opacity="0.05" />
    <path d="M0,400 Q150,300 300,400 T600,400 L600,400 L0,400 Z" fill="hsl(242, 70%, 50%)" opacity="0.1" />
    
    <!-- Main Decorative Shape -->
    <rect x="150" y="50" width="300" height="300" rx="60" fill="url(#grad7)" opacity="0.15" />
    <circle cx="300" cy="200" r="120" stroke="url(#grad7)" stroke-width="2" fill="none" opacity="0.3" />
    
    <!-- Icon Container -->
    <g filter="url(#shadow7)">
        <circle cx="300" cy="200" r="60" fill="url(#grad7)" />
        <path d="M12,2C10,2 4,10 4,14C4,18 8,22 12,22C16,22 20,18 20,14C20,10 14,2 12,2M12,19.5C9.5,19.5 7.5,17.5 7.5,15C7.5,12.5 9.5,10.5 12,10.5C14.5,10.5 16.5,12.5 16.5,15C16.5,17.5 14.5,19.5 12,19.5Z" transform="translate(270, 170) scale(2.5)" fill="#ffffff" />
    </g>
    
    <!-- Pattern Grids -->
    <g opacity="0.1">
        <circle cx='50' cy='50' r='2' fill='#ffffff' /><circle cx='50' cy='70' r='2' fill='#ffffff' /><circle cx='50' cy='90' r='2' fill='#ffffff' /><circle cx='50' cy='110' r='2' fill='#ffffff' /><circle cx='50' cy='130' r='2' fill='#ffffff' /><circle cx='70' cy='50' r='2' fill='#ffffff' /><circle cx='70' cy='70' r='2' fill='#ffffff' /><circle cx='70' cy='90' r='2' fill='#ffffff' /><circle cx='70' cy='110' r='2' fill='#ffffff' /><circle cx='70' cy='130' r='2' fill='#ffffff' /><circle cx='90' cy='50' r='2' fill='#ffffff' /><circle cx='90' cy='70' r='2' fill='#ffffff' /><circle cx='90' cy='90' r='2' fill='#ffffff' /><circle cx='90' cy='110' r='2' fill='#ffffff' /><circle cx='90' cy='130' r='2' fill='#ffffff' /><circle cx='110' cy='50' r='2' fill='#ffffff' /><circle cx='110' cy='70' r='2' fill='#ffffff' /><circle cx='110' cy='90' r='2' fill='#ffffff' /><circle cx='110' cy='110' r='2' fill='#ffffff' /><circle cx='110' cy='130' r='2' fill='#ffffff' /><circle cx='130' cy='50' r='2' fill='#ffffff' /><circle cx='130' cy='70' r='2' fill='#ffffff' /><circle cx='130' cy='90' r='2' fill='#ffffff' /><circle cx='130' cy='110' r='2' fill='#ffffff' /><circle cx='130' cy='130' r='2' fill='#ffffff' />
