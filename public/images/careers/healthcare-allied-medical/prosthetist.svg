<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad26" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(312, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(12, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow26" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <rect width="200" height="200" fill="hsl(312, 90%, 8%)" rx="24" />
    <path d="M100,10 L190,190 L10,190 Z" fill="url(#grad26)" fill-opacity="0.08" />
    
    <!-- Career Icon Background Glow -->
    <circle cx="100" cy="90" r="48" fill="url(#grad26)" opacity="0.25" filter="url(#shadow26)" />
    
    <g transform="translate(68, 58) scale(2.6)" fill="#fff" filter="url(#shadow26)">
        <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
    </g>

    <!-- Decorative unique pattern -->
    <g stroke="hsl(312, 70%, 50%)" stroke-width="1.5" fill="none" opacity="0.3">
        <path d="M20,180 L180,20 M20,20 L180,180" />
    </g>

    <text x="100" y="175" font-family="Sora, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="800" letter-spacing="0.5">PROSTHETIST</text>
