<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(84, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(144, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow7" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <rect width="200" height="200" fill="hsl(84, 90%, 8%)" rx="24" />
    <rect x="15" y="15" width="170" height="170" rx="25" fill="url(#grad7)" fill-opacity="0.1" />
    
    <!-- Career Icon Background Glow -->
    <circle cx="100" cy="90" r="48" fill="url(#grad7)" opacity="0.25" filter="url(#shadow7)" />
    
    <g transform="translate(68, 58) scale(2.6)" fill="#fff" filter="url(#shadow7)">
        <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
    </g>

    <!-- Decorative unique pattern -->
    <g stroke="hsl(84, 70%, 50%)" stroke-width="1.5" fill="none" opacity="0.3">
        <rect x="40" y="30" width="120" height="120" rx="10" />
    </g>

    <text x="100" y="175" font-family="Sora, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="800" letter-spacing="0.5">RADIOGRAPHER</text>
</svg>