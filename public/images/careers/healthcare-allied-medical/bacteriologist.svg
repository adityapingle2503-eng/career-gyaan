<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:hsl(12, 70%, 50%);stop-opacity:1" />
            <stop offset="100%" style="stop-color:hsl(72, 60%, 40%);stop-opacity:1" />
        </linearGradient>
        <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <rect width="200" height="200" fill="hsl(12, 90%, 8%)" rx="24" />
    <rect x="15" y="15" width="170" height="170" rx="25" fill="url(#grad1)" fill-opacity="0.1" />
    
    <!-- Career Icon Background Glow -->
    <circle cx="100" cy="90" r="48" fill="url(#grad1)" opacity="0.25" filter="url(#shadow1)" />
    
    <g transform="translate(68, 58) scale(2.6)" fill="#fff" filter="url(#shadow1)">
        <path d="M9.5,3A6.5,6.5 0 0,0 3,9.5A6.5,6.5 0 0,0 9.5,16C10.66,16 11.75,15.69 12.69,15.14L18.55,21L20,19.55L14.14,13.69C14.69,12.75 15,11.66 15,9.5A6.5,6.5 0 0,0 9.5,3M9.5,5A4.5,4.5 0 0,1 14,9.5A4.5,4.5 0 0,1 9.5,14A4.5,4.5 0 0,1 5,9.5A4.5,4.5 0 0,1 9.5,5Z" />
    </g>

    <!-- Decorative unique pattern -->
    <g stroke="hsl(12, 70%, 50%)" stroke-width="1.5" fill="none" opacity="0.3">
        <rect x="40" y="30" width="120" height="120" rx="10" />
    </g>

    <text x="100" y="175" font-family="Sora, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="800" letter-spacing="0.5">BACTERIOLOGIST</text>
</svg>